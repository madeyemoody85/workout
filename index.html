<!DOCTYPE html>
<html lang="en" style="background-color:#0c0c0c !important;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>My Workout Routine</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background-color:#0c0c0c !important;color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;font-size:15px;line-height:1.5;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
.app{background-color:#0c0c0c;min-height:100vh}
.hdr{padding:24px 20px 16px;border-bottom:1px solid #2a2a2a;background:#0c0c0c}
.hdr h1{font-size:24px;font-weight:700;color:#fff}
.hdr .tg{font-size:12px;color:#b0b0b0;margin-top:2px}
.hdr .sb{font-size:14px;color:#d4d4d4;margin-top:6px}
.mbar{display:flex;padding:10px 20px;border-bottom:1px solid #2a2a2a;background:#0c0c0c}
.mbtn{flex:1;padding:10px;border:1px solid #2a2a2a;background:transparent;color:#b0b0b0;font-size:13px;font-weight:600;text-transform:uppercase;cursor:pointer;font-family:inherit}
.mbtn:first-child{border-radius:8px 0 0 8px}
.mbtn:last-child{border-radius:0 8px 8px 0}
.mbtn.on{background:#1e1e1e;color:#fff;border-color:#444}
.pkr{padding:16px 20px;border-bottom:1px solid #2a2a2a;background:#0c0c0c}
.pkr-l{font-size:13px;color:#d4d4d4;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.pkr-g{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pkc{padding:12px 14px;border-radius:10px;border:1px solid #2a2a2a;background:#171717;cursor:pointer;text-align:left;position:relative;color:#f5f5f5}
.pkc:active{transform:scale(.98)}
.pkc.on{background:#1f1610}
.pkc .pn{font-size:14px;font-weight:600;color:#fff;margin-bottom:2px}
.pkc .pf{font-size:12px;color:#b0b0b0}
.pkc .pd{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%}
.pkc .nx{margin-top:4px;font-size:10px;font-weight:700;color:#fbbf24;text-transform:uppercase}
.dhdr{padding:16px 20px 12px;border-bottom:1px solid #2a2a2a;background:#0c0c0c}
.dhdr-r{display:flex;align-items:center;gap:10px;margin-bottom:2px}
.ddot{width:8px;height:8px;border-radius:50%}
.dhdr h2{font-size:20px;font-weight:600;color:#fff}
.dfoc{font-size:13px;color:#d4d4d4;margin-left:18px}
.ex{padding:16px 20px;border-bottom:1px solid #2a2a2a;transition:opacity .3s;background:#0c0c0c}
.ex.dn{opacity:.35}
.ext{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.exi{flex:1}
.enr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.en{font-size:16px;font-weight:600;color:#fff}
.ex.dn .en{text-decoration:line-through;color:#666}
.bdg{background:#14332a;color:#4ade80;font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px;text-transform:uppercase}
.em{display:flex;gap:14px;margin-top:8px;font-size:13px;color:#d4d4d4;flex-wrap:wrap}
.em .dt{color:#555}
.eno{font-size:13px;color:#b0b0b0;margin:8px 0 0}
.srow{display:flex;align-items:center;gap:10px;padding:6px 12px;background:#1a1a1a;border-radius:8px;border:1px solid #2a2a2a;margin-top:6px}
.srow:first-of-type{margin-top:10px}
.slbl{font-size:11px;color:#b0b0b0;font-weight:700;min-width:36px;text-transform:uppercase}
.srow input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:5px;background:#3a3a3a;border-radius:3px;outline:none}
.srow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--ac,#E85D3A);cursor:pointer;border:2px solid #0c0c0c;box-shadow:0 0 8px rgba(0,0,0,.5)}
.srow input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--ac,#E85D3A);cursor:pointer;border:2px solid #0c0c0c}
.sval{font-size:14px;font-weight:700;color:var(--ac,#E85D3A);min-width:60px;text-align:right}
.ck{width:32px;height:32px;border-radius:8px;border:2px solid #666;background:transparent;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ck.on{border:none;background:var(--ac,#E85D3A);color:#fff}
.prg{padding:16px 20px;background:#0c0c0c}
.prg-h{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:#b0b0b0;text-transform:uppercase;font-weight:600}
.prg-t{height:4px;background:#2a2a2a;border-radius:2px;overflow:hidden}
.prg-f{height:100%;border-radius:2px;transition:width .4s}
.logs{padding:12px 20px;background:#0c0c0c}
.lbtn{width:100%;padding:16px;border-radius:12px;border:none;font-size:14px;font-weight:700;text-transform:uppercase;cursor:pointer;font-family:inherit}
.lbtn.rdy{background:#4ade80;color:#000}
.lbtn.rdy:active{transform:scale(.98)}
.lbtn.off{background:#1a1a1a;color:#666;cursor:default}
.lbtn.lgd{background:#14332a;color:#4ade80}
.nuts{padding:0 20px 20px;background:#0c0c0c}
.ntgl{width:100%;padding:14px 16px;background:#171717;border:1px solid #2a2a2a;border-radius:10px;color:#fff;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:500;font-family:inherit}
.ngrd{padding:16px;background:#171717;border:1px solid #2a2a2a;border-radius:0 0 10px 10px;display:none;grid-template-columns:1fr 1fr;gap:14px}
.ngrd.op{display:grid}
.ngrd .nl{color:#b0b0b0;font-size:10px;text-transform:uppercase;font-weight:600;margin-bottom:3px}
.ngrd .nv{color:#E85D3A;font-weight:600;font-size:14px}
.ngrd .nv2{color:#d4d4d4;font-weight:500;font-size:14px}
.ftr{padding:16px 20px 32px;text-align:center;font-size:13px;color:#b0b0b0;border-top:1px solid #2a2a2a;background:#0c0c0c}
.vw{display:none}.vw.on{display:block}
.hwrap{padding:0 20px 24px;background:#0c0c0c}
.hemp{text-align:center;padding:60px 20px;color:#b0b0b0}
.hc{background:#171717;border:1px solid #2a2a2a;border-radius:10px;padding:14px 16px;margin-top:10px}
.hch{display:flex;justify-content:space-between;margin-bottom:8px}
.hcd{font-size:14px;font-weight:700}
.hcdt{font-size:12px;color:#b0b0b0}
.hce{font-size:13px;color:#d4d4d4;padding:4px 0;display:flex;justify-content:space-between}
.hce .hw{color:#fff;font-weight:600}
.stit{font-size:12px;color:#b0b0b0;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:24px;margin-bottom:6px;padding-bottom:8px;border-bottom:1px solid #2a2a2a}
.trow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e1e1e}
.tnm{font-size:14px;font-weight:500;color:#fff;flex:1}
.tnu{font-size:12px;color:#b0b0b0;margin-right:10px}
.tbdg{font-size:12px;font-weight:700;padding:3px 10px;border-radius:5px}
.tbdg.up{background:#14332a;color:#4ade80}
.tbdg.same{background:#1e1e1e;color:#b0b0b0}
.tbdg.down{background:#331414;color:#ef4444}
.stg{padding:20px 0;border-top:1px solid #2a2a2a;margin-top:14px}
.stg-t{font-size:12px;color:#b0b0b0;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:10px}
.tinp{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;font-size:13px;color:#fff;width:100%;box-sizing:border-box;font-family:inherit}
.tinp::placeholder{color:#666}
.sbtn{padding:10px 18px;border-radius:8px;background:transparent;font-size:12px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;font-family:inherit}
.stmsg{font-size:13px;font-weight:600;margin-top:8px;min-height:18px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#2a2a2a;color:#fff;font-size:14px;font-weight:600;padding:14px 24px;border-radius:12px;border-left:4px solid #4ade80;z-index:999;transition:transform .35s ease,opacity .35s;opacity:0;pointer-events:none;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body style="background-color:#0c0c0c !important;">
<div class="app">
<div class="hdr"><h1>Your Routine</h1><div class="tg">FLEXIBLE SCHEDULE · BACK SAFE</div><p class="sb">Pick your session · Train when you can · Stay in rotation</p></div>
<div class="mbar"><button class="mbtn on" id="bW" onclick="md('w')">Workout</button><button class="mbtn" id="bH" onclick="md('h')">History</button></div>
<div class="vw on" id="vW">
  <div class="pkr" id="pkr"></div>
  <div class="dhdr" id="dhdr"></div>
  <div id="exL"></div>
  <div class="prg" id="prg"></div>
  <div class="logs"><button class="lbtn off" id="lBtn" onclick="doLog()">Complete exercises to log</button></div>
  <div class="nuts">
    <button class="ntgl" id="ntgl" onclick="tgNut()"><span>Daily Nutrition Targets</span><span id="narr" style="transition:transform .25s;display:inline-block">&#9660;</span></button>
    <div class="ngrd" id="ngrd">
      <div><div class="nl">Calories</div><div class="nv">1,800 - 2,000/day</div></div>
      <div><div class="nl">Protein</div><div class="nv">140-160g/day</div></div>
      <div><div class="nl">Meals</div><div class="nv2">3 meals + 1 snack</div></div>
      <div><div class="nl">Water</div><div class="nv2">100oz+ daily</div></div>
    </div>
  </div>
  <div class="ftr">Walk 30-45 min daily · Drinks max 2-3 weekends · Pre-plan munchie snacks</div>
</div>
<div class="vw" id="vH"><div class="hwrap" id="hWrap"></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
var S=[
{id:"upper-a",label:"Upper Body A",focus:"Push emphasis",color:"#E85D3A",exercises:[
{name:"DB Bench Press",sets:3,reps:"10-12",base:35,unit:"lb plates",step:5,min:10,max:65,rest:"90s",notes:"Keep feet flat. Don't over-arch lower back."},
{name:"Seated Cable Row",sets:3,reps:"12-15",base:80,unit:"lbs",step:5,min:30,max:150,rest:"60s",notes:"Squeeze shoulder blades. Seated protects back."},
{name:"Seated OH DB Press",sets:3,reps:"10-12",base:25,unit:"lbs ea",step:2.5,min:10,max:50,rest:"90s",notes:"Back support. Don't lean back."},
{name:"Lat Pulldown",sets:3,reps:"10-12",base:100,unit:"lbs",step:5,min:40,max:180,rest:"60s",notes:"Controlled. No swinging."},
{name:"Cable Lat Raise",sets:3,reps:"15",base:12.5,unit:"lbs",step:2.5,min:5,max:30,rest:"45s",notes:"Light and controlled."},
{name:"DB Curl",sets:3,reps:"12",base:22.5,unit:"lbs",step:2.5,min:10,max:40,rest:"45s",notes:"Stand tall, no swinging."},
{name:"OH Tricep Cable Ext",sets:3,reps:"12-15",base:30,unit:"lbs",step:5,min:10,max:60,rest:"45s",notes:"Face away. Elbows tight."}]},
{id:"lower-a",label:"Lower Body A",focus:"Quad & glute emphasis",color:"#2E86AB",exercises:[
{name:"Goblet Squat",sets:3,reps:"12-15",base:35,unit:"lbs",step:5,min:0,max:70,rest:"90s",notes:"DB at chest. Safer than barbell squats."},
{name:"Leg Press",sets:3,reps:"12",base:140,unit:"lbs",step:10,min:50,max:300,rest:"90s",notes:"Don't let lower back round."},
{name:"Hip Thrust",sets:3,reps:"12",base:95,unit:"lbs",step:10,min:0,max:225,rest:"90s",notes:"Back on bench, drive through heels."},
{name:"Leg Curl",sets:3,reps:"12-15",base:50,unit:"lbs",step:5,min:20,max:120,rest:"60s",notes:"Control the negative."},
{name:"Leg Extension",sets:3,reps:"15",base:50,unit:"lbs",step:5,min:20,max:120,rest:"60s",notes:"Squeeze quads. Don't lock out."},
{name:"Calf Raise",sets:3,reps:"15-20",base:0,unit:"BW",step:0,min:0,max:0,rest:"45s",notes:"Full ROM. Pause at top."},
{name:"Dead Bug",sets:3,reps:"10 ea side",base:0,unit:"BW",step:0,min:0,max:0,rest:"45s",notes:"Lower back pressed into floor."}]},
{id:"recovery",label:"Active Recovery",focus:"Walk + mobility",color:"#6B7B8D",exercises:[
{name:"Brisk Walk",sets:1,reps:"30-45 min",base:0,unit:"-",step:0,min:0,max:0,rest:"-",notes:"Conversational pace."},
{name:"Cat-Cow Stretch",sets:2,reps:"10 each",base:0,unit:"-",step:0,min:0,max:0,rest:"-",notes:"Arch and round spine gently."},
{name:"Child's Pose",sets:2,reps:"30 sec",base:0,unit:"-",step:0,min:0,max:0,rest:"-",notes:"Knees wide. Decompress spine."},
{name:"Hip Flexor Stretch",sets:2,reps:"30s each",base:0,unit:"-",step:0,min:0,max:0,rest:"-",notes:"Half kneel. Releases lower back."},
{name:"Foam Roll",sets:1,reps:"5 min",base:0,unit:"-",step:0,min:0,max:0,rest:"-",notes:"Upper back and glutes only."}]},
{id:"upper-b",label:"Upper Body B",focus:"Pull emphasis",color:"#E85D3A",exercises:[
{name:"Chest Supported Row",sets:3,reps:"10-12",base:30,unit:"lbs ea",step:2.5,min:10,max:55,rest:"60s",notes:"Chest on pad. Zero back stress."},
{name:"Incline DB Press",sets:3,reps:"10-12",base:30,unit:"lbs ea",step:2.5,min:10,max:55,rest:"90s",notes:"Bench at 30 degrees. Upper chest."},
{name:"Cable Face Pull",sets:3,reps:"15",base:27.5,unit:"lbs",step:2.5,min:10,max:50,rest:"45s",notes:"Great for posture. Elbows high."},
{name:"Lat Pulldown (close)",sets:3,reps:"10-12",base:95,unit:"lbs",step:5,min:40,max:170,rest:"60s",notes:"V-bar. Slight lean is fine."},
{name:"Machine Chest Fly",sets:3,reps:"12-15",base:50,unit:"lbs",step:5,min:20,max:120,rest:"60s",notes:"Great stretch and squeeze."},
{name:"Hammer Curl",sets:3,reps:"12",base:22.5,unit:"lbs",step:2.5,min:10,max:40,rest:"45s",notes:"Palms facing. Arm thickness."},
{name:"Rope Pushdown",sets:3,reps:"12-15",base:37.5,unit:"lbs",step:2.5,min:15,max:70,rest:"45s",notes:"Spread rope at bottom."}]},
{id:"lower-b",label:"Lower Body B",focus:"Hamstring & posterior",color:"#2E86AB",exercises:[
{name:"DB Romanian DL",sets:3,reps:"10-12",base:30,unit:"lbs ea",step:2.5,min:10,max:60,rest:"90s",notes:"Dumbbells not barbell. Hinge at hips."},
{name:"Bulgarian Split Squat",sets:3,reps:"10 ea leg",base:15,unit:"lb DBs",step:5,min:0,max:50,rest:"90s",notes:"Rear foot on bench. Spine-friendly."},
{name:"Single Leg Hip Thrust",sets:3,reps:"10 each",base:0,unit:"BW",step:0,min:0,max:0,rest:"60s",notes:"One leg. Hits glutes harder."},
{name:"Seated Leg Curl",sets:3,reps:"12-15",base:50,unit:"lbs",step:5,min:20,max:120,rest:"60s",notes:"3-second negatives."},
{name:"Adductor Machine",sets:3,reps:"15",base:50,unit:"lbs",step:5,min:20,max:120,rest:"45s",notes:"Knee health and inner thigh."},
{name:"Pallof Press",sets:3,reps:"10 ea side",base:15,unit:"lbs",step:2.5,min:5,max:35,rest:"45s",notes:"Best core exercise for bad backs."},
{name:"Bird Dog",sets:3,reps:"8 ea side",base:0,unit:"BW",step:0,min:0,max:0,rest:"45s",notes:"Hold 2s at top. Back stability."}]},
{id:"rest",label:"Rest + Walk",focus:"Recovery & fat burn",color:"#6B7B8D",exercises:[
{name:"Walk",sets:1,reps:"30-60 min",base:0,unit:"-",step:0,min:0,max:0,rest:"-",notes:"Easy pace. Podcast or music."},
{name:"Light Stretching",sets:1,reps:"10-15 min",base:0,unit:"-",step:0,min:0,max:0,rest:"-",notes:"Hips, hamstrings, upper back."}]}
];

var act=0,mode="w",comp={},wts={},hist=[];
// Init per-set weights
for(var si=0;si<S.length;si++)for(var ei=0;ei<S[si].exercises.length;ei++)for(var sti=0;sti<S[si].exercises[ei].sets;sti++)wts[si+"-"+ei+"-"+sti]=S[si].exercises[ei].base;

function sv(){try{localStorage.setItem("wk5",JSON.stringify({c:comp,w:wts,h:hist,a:act,wh:document.getElementById("whIn")?document.getElementById("whIn").value:""}));}catch(e){}}
function ld(){try{var d=JSON.parse(localStorage.getItem("wk5")||"{}");if(d.c)comp=d.c;if(d.w){for(var k in d.w)wts[k]=d.w[k];}if(d.h)hist=d.h;if(d.a!==undefined)act=d.a;}catch(e){}}
function getWh(){try{var d=JSON.parse(localStorage.getItem("wk5")||"{}");return d.wh||"";}catch(e){return"";}}
function nxS(){if(!hist.length)return 0;return(hist[hist.length-1].si+1)%S.length;}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast";setTimeout(function(){t.classList.add("show");},10);setTimeout(function(){t.classList.remove("show");},2800);}
var chk='<svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M4 9L7.5 12.5L14 5.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function R(){
  document.documentElement.style.setProperty("--ac",S[act].color);
  if(mode==="w"){rPkr();rDH();rEx();rPrg();rLog();}else{rHist();}
}
function md(m){
  mode=m;
  document.getElementById("bW").className="mbtn"+(m==="w"?" on":"");
  document.getElementById("bH").className="mbtn"+(m==="h"?" on":"");
  document.getElementById("vW").className="vw"+(m==="w"?" on":"");
  document.getElementById("vH").className="vw"+(m==="h"?" on":"");
  R();
}
function rPkr(){
  var nx=nxS(),h='<div class="pkr-l">Pick Today\'s Session</div><div class="pkr-g">';
  for(var i=0;i<S.length;i++){
    var s=S[i],isA=i===act;
    h+='<div class="pkc'+(isA?" on":"")+'" style="'+(isA?"border-color:"+s.color:"")+'" onclick="pk('+i+')">';
    h+='<div class="pd" style="background:'+s.color+'"></div>';
    h+='<div class="pn">'+s.label+'</div><div class="pf">'+s.focus+'</div>';
    if(i===nx)h+='<div class="nx">&#9654; Up next</div>';
    h+='</div>';
  }
  h+='</div>';
  document.getElementById("pkr").innerHTML=h;
}
function rDH(){
  var s=S[act],dn=new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});
  document.getElementById("dhdr").innerHTML='<div class="dhdr-r"><div class="ddot" style="background:'+s.color+'"></div><h2>'+s.label+'</h2></div><div class="dfoc">'+dn+' &middot; '+s.focus+'</div>';
}
function rEx(){
  var s=S[act],h="";
  for(var ei=0;ei<s.exercises.length;ei++){
    var ex=s.exercises[ei],k=act+"-"+ei,isDn=!!comp[k],hasW=ex.step>0;
    h+='<div class="ex'+(isDn?" dn":"")+'"><div class="ext"><div class="exi">';
    h+='<div class="enr"><span class="en">'+ex.name+'</span><span class="bdg">&#10003; BACK-SAFE</span></div>';
    h+='<div class="em"><span>'+ex.sets+' sets</span><span class="dt">&middot;</span><span>'+ex.reps+'</span>';
    if(ex.rest!=="-")h+='<span class="dt">&middot;</span><span>Rest '+ex.rest+'</span>';
    h+='</div><p class="eno">'+ex.notes+'</p>';
    if(hasW){
      for(var sti=0;sti<ex.sets;sti++){
        var wk=act+"-"+ei+"-"+sti,w=wts[wk]!==undefined?wts[wk]:ex.base;
        h+='<div class="srow"><span class="slbl">Set '+(sti+1)+'</span>';
        h+='<input type="range" min="'+ex.min+'" max="'+ex.max+'" step="'+ex.step+'" value="'+w+'" oninput="aw('+act+','+ei+','+sti+',this.value)">';
        h+='<span class="sval" id="sv-'+wk+'">'+w+' '+ex.unit+'</span></div>';
      }
    }
    h+='</div><button class="ck'+(isDn?" on":"")+'" onclick="tg('+act+','+ei+')">'+(isDn?chk:"")+'</button></div></div>';
  }
  document.getElementById("exL").innerHTML=h;
}
function rPrg(){
  var s=S[act],t=s.exercises.length,d=0;
  for(var i=0;i<t;i++){if(comp[act+"-"+i])d++;}
  document.getElementById("prg").innerHTML='<div class="prg-h"><span>Session Progress</span><span>'+d+'/'+t+'</span></div><div class="prg-t"><div class="prg-f" style="width:'+(d/t*100)+'%;background:'+s.color+'"></div></div>';
}
function rLog(){
  var b=document.getElementById("lBtn"),s=S[act],t=s.exercises.length,d=0;
  for(var i=0;i<t;i++){if(comp[act+"-"+i])d++;}
  var td=new Date().toISOString().substring(0,10),lgd=false;
  for(var h=0;h<hist.length;h++){if(hist[h].date===td&&hist[h].si===act){lgd=true;break;}}
  if(lgd){b.className="lbtn lgd";b.textContent="\u2713 Logged today";b.onclick=null;}
  else if(d>0){b.className="lbtn rdy";b.textContent="Log "+s.label+" ("+d+"/"+t+" done)";b.onclick=doLog;}
  else{b.className="lbtn off";b.textContent="Complete exercises to log";b.onclick=null;}
}
function rHist(){
  var el=document.getElementById("hWrap");
  if(!hist.length){el.innerHTML='<div class="hemp">No workouts logged yet.</div>'+getSettingsHTML();return;}
  var h='<div class="stit">Recent Sessions</div>';
  var rec=hist.slice(-15).reverse();
  for(var r=0;r<rec.length;r++){
    var e=rec[r],sd=S[e.si],c=sd?sd.color:"#888";
    var ds=new Date(e.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
    h+='<div class="hc"><div class="hch"><span class="hcd" style="color:'+c+'">'+e.sl+'</span><span class="hcdt">'+ds+'</span></div>';
    for(var j=0;j<e.ex.length;j++){
      var x=e.ex[j],wt=x.sw?x.sw.join(" / ")+" "+x.u:(x.w>0?x.w+" "+x.u:"BW");
      h+='<div class="hce"><span>'+x.n+'</span><span class="hw">'+wt+'</span></div>';
    }
    h+='</div>';
  }
  // Trends
  var exM={};
  for(var t=0;t<hist.length;t++)for(var te=0;te<hist[t].ex.length;te++){
    var tx=hist[t].ex[te],mw=tx.sw?Math.max.apply(null,tx.sw):(tx.w||0);
    if(mw>0){if(!exM[tx.n])exM[tx.n]=[];exM[tx.n].push({w:mw,u:tx.u});}
  }
  var tks=Object.keys(exM),hasT=false;
  for(var tk=0;tk<tks.length;tk++){if(exM[tks[tk]].length>=2){hasT=true;break;}}
  if(hasT){
    h+='<div class="stit" style="margin-top:28px">Weight Trends (max per session)</div>';
    for(var k=0;k<tks.length;k++){
      var nm=tks[k],en=exM[nm];if(en.length<2)continue;
      var f=en[0].w,l=en[en.length-1].w,df=l-f;
      var cls=df>0?"up":df<0?"down":"same",sg=df>0?"+":"";
      h+='<div class="trow"><span class="tnm">'+nm+'</span><span class="tnu">'+f+' \u2192 '+l+' '+en[0].u+'</span><span class="tbdg '+cls+'">'+sg+df+'</span></div>';
    }
  }
  // Week
  var now=new Date(),ws=new Date(now);ws.setDate(now.getDate()-now.getDay());var wStr=ws.toISOString().substring(0,10);
  var wd={};for(var w=0;w<hist.length;w++){if(hist[w].date>=wStr)wd[hist[w].date]=true;}
  var wc=Object.keys(wd).length;
  h+='<div style="margin-top:24px;padding:18px;background:#171717;border:1px solid #2a2a2a;border-radius:12px;text-align:center">';
  h+='<div style="font-size:11px;color:#b0b0b0;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px">This Week</div>';
  h+='<div style="font-size:32px;font-weight:700;color:#fff">'+wc+'</div>';
  h+='<div style="font-size:14px;color:#d4d4d4;margin-top:4px">workout'+(wc!==1?"s":"")+" logged</div></div>";
  h+=getSettingsHTML();
  el.innerHTML=h;
  var whI=document.getElementById("whIn");if(whI)whI.value=getWh();
}
function getSettingsHTML(){
  return '<div class="stg"><div class="stg-t">Google Sheets Sync</div><p style="font-size:13px;color:#d4d4d4;margin-bottom:12px">Paste your Apps Script URL to auto-sync.</p><input class="tinp" id="whIn" placeholder="https://script.google.com/macros/s/..."><div style="display:flex;gap:8px;margin-top:10px"><button class="sbtn" style="border:1px solid #4ade80;color:#4ade80" onclick="svWh()">Save URL</button><button class="sbtn" style="border:1px solid #888;color:#888" onclick="tstWh()">Test</button></div><div class="stmsg" id="whSt"></div></div><div style="padding-top:14px"><button class="sbtn" style="border:1px solid #888;color:#888" onclick="expCSV()">Export CSV</button></div><div style="padding:14px 0 30px"><button class="sbtn" style="border:1px solid #444;color:#666" onclick="clrH()">Clear History</button></div>';
}
function pk(i){act=i;sv();R();}
function tg(si,ei){var k=si+"-"+ei;if(comp[k])delete comp[k];else comp[k]=true;sv();R();}
function aw(si,ei,sti,v){var k=si+"-"+ei+"-"+sti;wts[k]=parseFloat(v);var el=document.getElementById("sv-"+k);if(el)el.textContent=v+" "+S[si].exercises[ei].unit;sv();}
function tgNut(){var g=document.getElementById("ngrd"),a=document.getElementById("narr");g.classList.toggle("op");a.style.transform=g.classList.contains("op")?"rotate(180deg)":"none";}
function doLog(){
  var s=S[act],td=new Date().toISOString().substring(0,10);
  var exs=[];
  for(var i=0;i<s.exercises.length;i++){
    var ex=s.exercises[i],sw=[];
    for(var sti=0;sti<ex.sets;sti++){var wk=act+"-"+i+"-"+sti;sw.push(wts[wk]!==undefined?wts[wk]:ex.base);}
    exs.push({n:ex.name,s:ex.sets,r:ex.reps,sw:sw,u:ex.unit,c:!!comp[act+"-"+i]});
  }
  var entry={date:td,si:act,sl:s.label,ex:exs,ts:new Date().toISOString()};
  hist.push(entry);
  s.exercises.forEach(function(_,ei){delete comp[act+"-"+ei];});
  var nx=(act+1)%S.length;act=nx;sv();
  toast("Logged! Next: "+S[nx].label);
  var wh=getWh();
  if(wh){try{var rows=[];exs.forEach(function(e){e.sw.forEach(function(w,si){rows.push({date:td,day:s.label,exercise:e.n,set:si+1,reps:e.r,weight:w,unit:e.u,completed:e.c});});});fetch(wh,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({rows:rows})});}catch(e){}}
  R();
}
function svWh(){var u=(document.getElementById("whIn")||{}).value||"";try{var d=JSON.parse(localStorage.getItem("wk5")||"{}");d.wh=u;localStorage.setItem("wk5",JSON.stringify(d));}catch(e){}var s=document.getElementById("whSt");s.textContent=u?"\u2713 Saved":"Cleared";s.style.color="#4ade80";setTimeout(function(){s.textContent="";},2000);}
function tstWh(){var u=(document.getElementById("whIn")||{}).value||"",s=document.getElementById("whSt");if(!u){s.textContent="\u2717 Enter URL";s.style.color="#ef4444";return;}s.textContent="Testing...";s.style.color="#b0b0b0";fetch(u,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({rows:[{date:"TEST",day:"Test",exercise:"Test",set:1,reps:"0",weight:0,unit:"-",completed:true}]})}).then(function(){s.textContent="\u2713 Sent";s.style.color="#4ade80";}).catch(function(){s.textContent="\u2717 Failed";s.style.color="#ef4444";});setTimeout(function(){s.textContent="";},3000);}
function expCSV(){if(!hist.length)return;var csv="Date,Session,Exercise,Set,Reps,Weight,Unit,Completed\n";hist.forEach(function(h){h.ex.forEach(function(e){if(e.sw){e.sw.forEach(function(w,si){csv+=h.date+',"'+h.sl+'","'+e.n+'",'+(si+1)+',"'+e.r+'",'+w+',"'+e.u+'",'+e.c+"\n";});}else{csv+=h.date+',"'+h.sl+'","'+e.n+'",all,"'+e.r+'",'+(e.w||0)+',"'+e.u+'",'+e.c+"\n";}});});var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="workout.csv";a.click();toast("CSV downloaded");}
function clrH(){if(confirm("Clear all history?")){hist=[];sv();toast("Cleared");R();}}
ld();R();
</script>
</body>
